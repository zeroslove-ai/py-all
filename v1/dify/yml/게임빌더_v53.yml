    - data:
        code: "function main({narrative_text}) {\n  const text = narrative_text || '';\n  const lines = text.split('\\n').filter(l => l.trim().length > 0);\n  const lineOk = lines.length >= 20;\n  // 나이 안전장치: 서사에 명시적으로 19세 미만 나이가 언급되면 저장을 차단한다.\n  // 이 게임의 모든 캐릭터는 24세 이상 성인으로 설정되어 있으므로, 이보다 어린 나이가\n  // 조금이라도 언급되면 절대 저장/전달하지 않는다.\n  const ageMatches = text.match(/(\\d{1,2})\\s*세/g) || [];\n  let ageSafe = true;\n  for (const m of ageMatches) {\n    const n = parseInt(m, 10);\n    if (!isNaN(n) && n < 19) { ageSafe = false; break; }\n  }\n  const ok = lineOk && ageSafe;\n  return { valid: ok ? 'true' : 'false', line_count: lines.length, age_safe: ageSafe ? 'true' : 'false' };\n}\n"
