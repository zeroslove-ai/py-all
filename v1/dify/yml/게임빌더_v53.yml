    - data:
        code: "function main({ctx}) {\n  let obj = {};\n  try { obj = JSON.parse(ctx || '{}'); } catch (e) {}\n  const save = obj.save || {};\n  const mems = Array.isArray(obj.recent_memories) ? obj.recent_memories : [];\n  const last = mems.length ? mems[mems.length - 1] : null;\n  const raw = (last && last.content) ? String(last.content) : '';\n  const cid = save.last_character_id || '';\n  const master = obj.master || {};\n  const chars = master.characters || {};\n  const name = (chars[cid] && chars[cid].name) ? chars[cid].name : '';\n\n  // 서사 본문만 사용 (--- 구분선 이후 마인드모니터/상황판은 TTS 대상 아님)\n  const scene = raw.split('\\n---')[0];\n\n  // 화자 태그: (**)이름(**) (지문)?: \"대사\"\n  // 지문은 Fish S2 인라인 태그 문법 [지문]으로 변환해 대사 앞에 붙임 (한국어 자유 서술 태그 지원)\n  const speakerRe = /\\*{0,2}([가-힣A-Za-z0-9]{2,12})\\*{0,2}\\s*(?:\\(([^)\\n]{0,60})\\))?\\s*:\\s*\"([^\"]+)\"/g;\n  let lines = [];\n  let m;\n  while ((m = speakerRe.exec(scene)) !== null) {\n    const speaker = m[1].trim();\n    if (name && speaker !== name) continue; // 대상 캐릭터 대사만\n    const dir = (m[2] || '').trim();\n    lines.push((dir ? '[' + dir + '] ' : '') + m[3]);\n  }\n\n  // 폴백: 대상 캐릭터 대사가 없으면 화자태그 제거한 서술 200자\n  let text = lines.length\n    ? lines.join(' ... ')\n    : scene.replace(/\\*{0,2}[가-힣A-Za-z0-9]{2,12}\\*{0,2}\\s*(?:\\([^)\\n]{0,60}\\))?\\s*:\\s*\"[^\"]+\"/g, '').slice(0, 200).trim();\n\n  // JSON body 깨짐 방지: 큰따옴표/백슬래시/줄바꿈 제거 (대괄호 태그는 JSON 안전)\n  text = text.replace(/[\"\\\\]+/g, ' ').replace(/[\\r\\n]+/g, ' ').replace(/\\s{2,}/g, ' ').trim();\n\n  let voice = (chars[cid] && chars[cid].voice_id) ? chars[cid].voice_id : '';\n  if (!voice) {\n    const first = Object.keys(chars)[0];\n    if (first && chars[first].voice_id) voice = chars[first].voice_id;\n  }\n  return { tts_text: text, voice_id: voice };\n}"
        code_language: javascript
        desc: 최근 턴에서 대상 캐릭터 대사만 추출. 괄호 지문은 Fish S2 인라인 태그 [지문]으로 변환해 연기 톤 전달. 서사 본문만 사용(마인드모니터/상황판 제외), JSON 안전 처리 포함
