name: Apply stage2 special image roles

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused patch
        run: node scripts/apply-stage2-special-images.mjs

      - name: Run tests
        run: npm test

      - name: Check Worker syntax
        run: node --check worker/game-proxy-v2.js

      - name: Commit verified patch
        run: |
          rm scripts/apply-stage2-special-images.mjs
          rm .github/workflows/apply-stage2-special-images.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "add deterministic hypnosis and heart-eye image roles"
          git push origin HEAD:main
