    - data:
        code: "function main({ctx}) {\n  let obj = {};\n  try { obj = JSON.parse(ctx || '{}'); } catch (e) {}\n  const save = obj.save || {};\n  const pick = (src, keys) => {\n    const out = {};\n    for (const k of keys) {\n      if (src && Object.prototype.hasOwnProperty.call(src, k)) out[k] = src[k];\n    }\n    return out;\n  };\n  const slim = {\n    game_id: obj.game_id,\n    has_game: obj.has_game,\n    title: obj.title,\n    turn_count: obj.turn_count,\n    master: obj.master || {},\n    save: pick(save, ['npc_stats','npc_emotion','last_character_id','last_image_id','story_summary_overall','story_summary_recent100','recent100_start_turn','turn_count']),\n    story_summary_overall: obj.story_summary_overall || save.story_summary_overall || '',\n    story_summary_recent100: obj.story_summary_recent100 || save.story_summary_recent100 || ''\n  };\n  return { slim: JSON.stringify(slim) };\n}"
        code_language: javascript
        desc: 빌드 저장 LLM(b_llm_extract)은 game_master 반영만 하면 되므로 image_catalog/recent_memories/save 등을 빼고 master만 남김 (처리시간 단축, 이미지는 플레이 저장LLM이 별도 처리)
