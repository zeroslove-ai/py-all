    - data:
        code: "function main({ctx}) {\n  let obj = {};\n  try { obj = JSON.parse(ctx || '{}'); } catch (e) {}\n  const rawCatalog = Array.isArray(obj.image_catalog) ? obj.image_catalog : [];\n  const save = obj.save || {};\n  const master = obj.master || {};\n  const pick = (src, keys) => {\n    const out = {};\n    for (const k of keys) {\n      if (src && Object.prototype.hasOwnProperty.call(src, k)) out[k] = src[k];\n    }\n    return out;\n  };\n  const isEmpty = (v) => v === null || v === undefined || v === '' || (Array.isArray(v) && v.length === 0) || (typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length === 0);\n  const cleanSave = (src) => {\n    const out = {};\n    for (const k of Object.keys(src || {})) {\n      if (k.startsWith('debug_')) continue;\n      if (k === 'rules_full' || k === 'master' || k === 'image_catalog') continue;\n      const v = src[k];\n      if (isEmpty(v)) continue;\n      out[k] = v;\n    }\n    return out;\n  };\n  // 서사LLM용: 이미지는 서사LLM이 고르지 않으므로 카탈로그 자체를 완전히 비운다(이미지 언급 유발 방지).\n  // recent_memories는 get_context RPC가 이미 서버단에서 오래된 턴의 마인드모니터/상황판을 걸러주므로 그대로 사용한다.\n  const forNarrative = Object.assign({}, obj);\n  forNarrative.image_catalog = {};\n  forNarrative.save = cleanSave(save);\n\n  // 상태추출LLM용: 기존 v25 slim 유지\n  const forExtract = {\n    game_id: obj.game_id,\n    has_game: obj.has_game,\n    title: obj.title,\n    turn_count: obj.turn_count,\n    characters: master.characters,\n    stat_definitions: master.stat_definitions,\n    save: pick(save, ['npc_stats','npc_emotion','story_summary_overall','story_summary_recent100','recent100_start_turn','turn_count']),\n    story_summary_overall: obj.story_summary_overall || save.story_summary_overall || '',\n    story_summary_recent100: obj.story_summary_recent100 || save.story_summary_recent100 || '',\n    image_catalog: rawCatalog.map(it => ({\n      image_id: it.image_id,\n      character_id: it.character_id,\n      emotion_id: it.emotion_id,\n      situation: it.situation,\n      is_sexual: !!it.is_sexual\n    }))\n  };\n\n  return { stripped: JSON.stringify(forNarrative), stripped_extract: JSON.stringify(forExtract) };\n}"
