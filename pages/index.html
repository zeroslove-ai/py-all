<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임빌더 v2</title>
  <style>
    /* ─── CSS Variables (Dark Theme) ─── */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #2a2a4a;
      --success: #4ecca3;
      --warning: #f4d03f;
      --danger: #e74c3c;
      --font-mono: 'Courier New', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.2rem; color: var(--accent); }
    .header .meta { font-size: 0.8rem; color: var(--text-secondary); }
    .header .meta span { margin-left: 12px; }

    /* ─── Main Layout ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Story Stream (Left/Center) ─── */
    .story-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .story-stream {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      line-height: 1.8;
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .story-stream .narrative { margin-bottom: 16px; }
    .story-stream .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .story-stream .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      animation: blink 1s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* ─── Side Panel (Right) ─── */
    .side-panel {
      width: 320px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .side-panel .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .side-panel .panel-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Character Image */
    .character-img {
      width: 100%;
      height: 440px;
      object-fit: contain;
      object-position: top center;
      border-radius: var(--radius);
      background: var(--bg-tertiary);
      display: block;
    }
    .character-img.hidden { display: none; }

    /* Mind Monitor */
    .mind-monitor {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: var(--radius);
      display: grid;
      gap: 10px;
    }

    /* Player Status */
    .player-status {
      font-size: 0.85rem;
    }
    .player-status .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .player-status .stat-label { color: var(--text-secondary); }
    .player-status .stat-value { color: var(--accent); }
    .info-list, .npc-status { font-size: 0.85rem; }
    .stat-value.signal-green { color: #4ade80; }
    .stat-value.signal-yellow { color: #facc15; }
    .stat-value.signal-red { color: #fb7185; }
    .delta-up { color: #4ade80; } .delta-down { color: #fb7185; }

    /* Audio Player */
    .audio-player {
      display: none;
    }
    .audio-player.active {
      display: block;
      width: 100%;
      margin-top: 8px;
    }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    /* Choice Buttons */
    .choice-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .choice-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
      flex: 1;
      min-width: 140px;
      text-align: left;
    }
    .choice-btn:hover {
      border-color: var(--accent);
      background: var(--bg-primary);
    }
    .choice-btn .marker {
      color: var(--accent);
      font-weight: bold;
      margin-right: 6px;
    }
    .choice-btn.explicit {
      border-color: var(--warning);
    }

    /* Chat Input */
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send {
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .chat-send:hover { background: var(--accent-hover); }
    .chat-send:disabled {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }
    .loading.active { display: block; }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .side-panel { display: none; }
      .choice-btn { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🎮 게임빌더 v2</h1>
    <div class="meta">
      <span id="game-title">게임 제목</span>
      <span id="turn-count">턴: 0</span>
      <span id="mode-badge">플레이</span>
    </div>
  </header>

  <div class="main">
    <div class="story-panel">
      <div class="story-stream" id="story-stream">
        <div class="loading" id="loading">서사를 불러오는 중</div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="panel-section">
        <div class="panel-title">캐릭터</div>
        <img class="character-img hidden" id="character-img" alt="character">
      </div>

      <div class="panel-section">
        <div class="panel-title">마인드 모니터</div>
        <div class="mind-monitor" id="mind-monitor">(대기 중)</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">플레이어 상황</div>
        <div class="player-status" id="player-status">
          <div class="stat-row"><span class="stat-label">위치</span><span class="stat-value" id="stat-location">-</span></div>
          <div class="stat-row"><span class="stat-label">순응도</span><span class="stat-value" id="stat-순응도">-</span></div>
          <div class="stat-row"><span class="stat-label">호감도</span><span class="stat-value" id="stat-호감도">-</span></div>
          <div class="stat-row"><span class="stat-label">최면깊이</span><span class="stat-value" id="stat-최면깊이">-</span></div>
          <div class="stat-row"><span class="stat-label">상식개변</span><span class="stat-value" id="stat-csa">없음</span></div>
        </div>
      </div>

      <div class="panel-section">
        <audio class="audio-player" id="audio-player" controls></audio>
      </div>
    </aside>
  </div>

  <div class="bottom-bar">
    <div class="choice-buttons" id="choice-buttons"></div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="행동을 입력하거나 선택지를 클릭하세요..." autocomplete="off">
      <button class="chat-send" id="chat-send">전송</button>
    </div>
  </div>

  <script src="state.js"></script>
  <script src="api.js"></script>
  <script src="stream.js"></script>
  <script src="ui.js"></script>
  <script src="sidebar.js"></script>
  <script>
    // ─── Entry Point ───
    const GAME_ID = new URLSearchParams(location.search).get('game') || localStorage.getItem('gameId');
    if (GAME_ID) {
      state.gameId = GAME_ID;
      localStorage.setItem('gameId', GAME_ID);
      loadGameContext();
    } else {
      ui.showSystemMessage('게임 ID가 없습니다. URL에 ?game=GAME_ID를 추가하거나 /api/context로 게임을 로드하세요.');
    }

    async function loadGameContext() {
      ui.setLoading(true);
      try {
        const ctx = await api.context(state.gameId);
        state.turnCount = ctx.turn_count ?? 0;
        state.imageCatalog = ctx.image_catalog || {};
        state.context = ctx.context || null;
        ui.updateMeta(ctx.context?.master?.title || ctx.context?.title || '게임 제목', state.turnCount);
        sidebar.updateContext(state.context);
        const activeCharacterId = state.context?.save?.last_character_id;
        if (activeCharacterId && activeCharacterId !== 'narrator') {
          sidebar.updateMind(state.context?.save?.npc_emotion?.[activeCharacterId]);
          sidebar.renderStats(state.context?.save?.npc_stats?.[activeCharacterId]);
          api.image(state.gameId, activeCharacterId, state.context?.save?.last_image_id)
            .then(res => { if (res.image_url) ui.showImage(res.image_url); })
            .catch(() => {});
        }
        ui.setLoading(false);
      } catch (e) {
        ui.showSystemMessage('컨텍스트 로드 실패: ' + e.message);
        ui.setLoading(false);
      }
    }

    // ─── Event Listeners ───
    document.getElementById('chat-send').addEventListener('click', handleInput);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleInput();
    });

    async function handleInput() {
      const input = document.getElementById('chat-input').value.trim();
      if (!input || !state.gameId || state.isStreaming) return;
      document.getElementById('chat-input').value = '';

      ui.addUserMessage(input);
      ui.setLoading(true);
      state.isStreaming = true;

      try {
        const currentTurn = state.turnCount;
        const nextTurn = currentTurn + 1;

        // ① 서사 스트리밍
        const storyResult = await stream.story(state.gameId, input, currentTurn, (chunk) => {
          ui.appendNarrative(chunk);
        });
        const narrative = storyResult.text;

        ui.finalizeNarrative();

        // 재진입 응답은 현재 상태 안내이므로 새로운 턴으로 저장하지 않는다.
        if (storyResult.mode === 'reentry') {
          const choices = ui.parseChoices(narrative);
          ui.renderChoices(choices, submitChoice);
          return;
        }

        // ② 상태 추출
        // 원본 입력을 별도 필드로 보내 이름·직업 등이 서사에서 생략돼도 저장한다.
        const extract = await api.extract(state.gameId, narrative, nextTurn, input);
        state.lastExtract = extract;

        // ③ 이미지/TTS는 선택 작업으로 병렬 실행
        const optionalTasks = [];

        // 이미지
        if (extract.character_id && extract.character_id !== 'narrator') {
          optionalTasks.push(
            api.image(state.gameId, extract.character_id, extract.image_id)
              .then(res => { if (res.image_url) ui.showImage(res.image_url); })
              .catch(() => {})
          );
        }

        // TTS (auto_tts ON이고 대사 있으면)
        if (state.autoTts && extract.dialogue_lines && extract.dialogue_lines.length > 0) {
          const line = extract.dialogue_lines[0];
          const voiceId = getVoiceId(extract.character_id);
          if (voiceId && line.text) {
            optionalTasks.push(
              api.tts(line.text, voiceId)
                .then(res => { if (res.url) ui.playAudio(res.url); })
                .catch(() => {})
            );
          }
        }

        // ④ 핵심 저장은 Worker의 단일 커밋 엔드포인트로 수행한다.
        const enginePatch = storyResult.mode === 'opening'
          ? { opening_started: true }
          : {};
        const saveRes = await retryRequest(() =>
          api.commitTurn(state.gameId, nextTurn, narrative, extract, enginePatch)
        );
        state.turnCount = saveRes.turn_count;
        ui.updateMeta(null, state.turnCount);
        sidebar.updateCharacter(extract.character_id);
        sidebar.updateMind(extract.npc_emotion);
        sidebar.renderStats(extract.npc_stats);

        // ⑤ 저장 성공 후 선택지를 활성화한다.
        const choices = ui.parseChoices(narrative);
        ui.renderChoices(choices, submitChoice);

        await Promise.allSettled(optionalTasks);

      } catch (e) {
        if (e.status === 409) {
          ui.showSystemMessage('다른 창에서 턴이 진행되었습니다. 최신 상태를 다시 불러옵니다.');
          await loadGameContext();
        } else {
          ui.showSystemMessage('턴 저장 또는 처리 실패: ' + e.message + ' — 입력을 다시 시도해 주세요.');
        }
      } finally {
        state.isStreaming = false;
        ui.setLoading(false);
      }
    }

    function submitChoice(choiceText) {
      document.getElementById('chat-input').value = choiceText;
      handleInput();
    }

    async function retryRequest(operation, maxAttempts = 3) {
      let lastError;
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          return await operation();
        } catch (error) {
          lastError = error;
          if (error.status && error.status < 500) throw error;
          if (attempt < maxAttempts) {
            await new Promise(resolve => setTimeout(resolve, 300 * (2 ** (attempt - 1))));
          }
        }
      }
      throw lastError;
    }

    function getVoiceId(characterId) {
      return state.context?.master?.characters?.[characterId]?.voice_id || null;
    }
  </script>
</body>
</html>
