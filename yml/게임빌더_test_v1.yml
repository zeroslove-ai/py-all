    - data:
        code: "function main({query, current_mode, ctx_body, pending_delete_id, auto_tts_in}) {\n  let turn_count = 0;\n  let auto_tts = (typeof auto_tts_in === 'boolean') ? auto_tts_in : true;\n  try {\n    const ctx = JSON.parse(ctx_body || '{}');\n    turn_count = ctx.turn_count || 0;\n    if (ctx.save && ctx.save.data && typeof ctx.save.data.auto_tts === 'boolean') {\n      auto_tts = ctx.save.data.auto_tts;\n    }\n  } catch (e) {}\n\n  const q = (query || '').normalize('NFC').trim();\n  let new_auto_tts = auto_tts;\n\n  // 테스트 모드: /음성자동 켜기/끄기만 허용, 나머지는 모두 PLAY\n  if (q.startsWith('/음성자동')) {\n    new_auto_tts = !(q.includes('끄기') || q.toLowerCase().includes('off'));\n  }\n\n  return {\n    route: 'play',\n    next_mode: 'play',\n    rest_text: q,\n    turn_count: turn_count || 0,\n    auto_tts: new_auto_tts\n  };\n}"
