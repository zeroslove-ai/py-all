        x: 0
        y: 659.5333333333334
      selected: false
      type: custom
      width: 242
    - data:
        code: "function main({query, current_mode, ctx_body, pending_delete_id, auto_tts_in}) {\n  let turn_count = 0;\n  let auto_tts = (typeof auto_tts_in === 'boolean') ? auto_tts_in : true;\n  try {\n    const ctx = JSON.parse(ctx_body || '{}');\n    turn_count = ctx.turn_count || 0;\n    if (ctx.save && ctx.save.data && typeof ctx.save.data.auto_tts === 'boolean') {\n      auto_tts = ctx.save.data.auto_tts;\n    }\n  } catch (e) {}\n\n  const q = (query || '').normalize('NFC').trim();\n  const prev = current_mode || 'build';\n\n  // 삭제 확인 대기중이면 최우선\n  if (pending_delete_id && pending_delete_id.length > 0) {\n    return { route: 'delete_request', next_mode: prev, rest_text: q,\n             turn_count: turn_count || 0, auto_tts: auto_tts };\n  }\n\n  // 슬래시가 있을 때만 모드 전환. 없으면 직전 모드 그대로 -> 자연어가 그냥 통과됨\n  let route = prev;\n  let new_auto_tts = auto_tts;\n\n  // '/음성자동'은 '/음성'보다 먼저 체크 (더 구체적인 커맨드) -- 순수 설정 토글이라 별도 route로 분리,\n  // play route로 새지 않게 해서 게임 턴/LLM 호출을 절대 쓰지 않게 함\n  if (q.startsWith('/빌드') || q.startsWith('/build')) route = 'build';\n  else if (q.startsWith('/플레이') || q.startsWith('/play')) route = 'play';\n  else if (q.startsWith('/삭제')) route = 'delete_request';\n  else if (q.startsWith('/음성자동')) {\n    route = 'tts_toggle';\n    new_auto_tts = !(q.includes('끄기') || q.toLowerCase().includes('off'));\n  }\n  else if (q.startsWith('/음성')) route = 'tts_request';\n\n  // build/play만 지속 모드. 삭제/토글은 1회성이라 직전 모드를 그대로 들고 감\n  const next_mode = (route === 'build' || route === 'play') ? route : prev;\n\n  const rest = q.replace(/^\\/[가-힣a-zA-Z]+\\s*/, '');\n\n  let t = turn_count || 0;\n  // 실제 행동 텍스트가 있을 때만 턴 소모 -- \"/플레이\" 단독 재진입, 토글 명령 모두 턴 안 씀\n  if (route === 'play' && rest.trim().length > 0) t = t + 1;\n\n  return {\n    route: route,\n    next_mode: next_mode,\n    rest_text: rest,\n    turn_count: t,\n    auto_tts: new_auto_tts\n  };\n}"
        code_language: javascript
        desc: 슬래시 있으면 모드전환, 없으면 직전 모드 유지 -> 자연어 대화 가능
        outputs:
          auto_tts:
            type: boolean
          next_mode:
            type: string
          rest_text:
            type: string
          route:
            type: string
          turn_count:
            type: number
        selected: false
        title: 라우터(모드유지)
