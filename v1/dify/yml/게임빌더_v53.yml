    - data:
        code: "function main({text, narrative, catalog}) {\n  // 서사LLM이 마크다운 이미지를 직접 삽입하는 경우가 있어(모델 자체 습관, 메모리/컨텍스트와 무관하게 발생),\n  // 화면 스트리밍은 못 막아도 최소한 저장되는 내용에서는 제거해 다음 턴 기억으로 재유입되지 않게 한다.\n  const hadInlineImage = !!(narrative && narrative.includes('!['));\n  if (narrative) narrative = narrative.replace(/!\\[[^\\]]*\\]\\([^\\s]*\\)/g, '').replace(/\\n{3,}/g, '\\n\\n').trim();\n\n  let jsonStr = null;\n  let m = text.match(/```json\\s*([\\s\\S]*?)\\s*```/i);\n  if (m) jsonStr = m[1];\n  if (!jsonStr) {\n    m = text.match(/```\\s*([\\s\\S]*?)\\s*```/);\n    if (m && m[1].trim().startsWith('{')) jsonStr = m[1];\n  }\n  if (!jsonStr) {\n    const first = text.indexOf('{');\n    const last = text.lastIndexOf('}');\n    if (first !== -1 && last > first) jsonStr = text.slice(first, last + 1);\n  }\n\n  let j = {};\n  if (jsonStr) { try { j = JSON.parse(jsonStr); } catch(e) {} }\n\n  const esc = (s) => JSON.stringify(String(s == null ? '' : s)).slice(1, -1);\n\n  const choices = Array.isArray(j.choices) ? j.choices : [];\n\n  let cid = j.character_id || 'narrator';\n  const npcsPresent = Array.isArray(j.npcs_present) ? j.npcs_present.filter(x => typeof x === 'string' && x.trim()) : [];\n  if (npcsPresent.length > 0 && !npcsPresent.includes(cid)) {\n    cid = npcsPresent[0]; // LLM이 목록을 무시하고 narrator 등을 골랐으면 목록의 첫 NPC로 강제 교정\n  }\n  // npcs_present가 비어있는데도 cid가 narrator/미매핑이면, 서사 원문에 등장한 캐릭터 실명을 찾아 최후 보정\n  if ((!cid || cid === 'narrator') && (narrative || '')) {\n    const nameMap = {\n      '한소영': 'heroine1', '강세라': 'heroine2', '최유리': 'heroine3', '배수진': 'heroine4',\n      '김지은': 'heroine5', '윤아름': 'heroine6', '서지아': 'heroine7', '한세아': 'heroine8',\n      '박소현': 'heroine9', '임수정': 'heroine10'\n    };\n    for (const name in nameMap) {\n      if (narrative.includes(name)) { cid = nameMap[name]; break; }\n    }\n  }\n  const stats = (j.npc_stats && typeof j.npc_stats === 'object') ? j.npc_stats : {};\n  const emotion = (j.npc_emotion && typeof j.npc_emotion === 'object') ? j.npc_emotion : {};\n\n  const savePatch = { npc_stats: {}, npc_emotion: {},\n    story_summary_overall: j.story_summary_overall || '',\n    story_summary_recent100: j.story_summary_recent100 || '' };\n  if (j.recent100_reset && typeof j.new_recent100_start_turn === 'number') {\n    savePatch.recent100_start_turn = j.new_recent100_start_turn;\n  }\n  savePatch.npc_stats[cid] = stats;\n  savePatch.npc_emotion[cid] = emotion;\n\n  let imgIdStr = '';\n  if (j.image_id !== undefined && j.image_id !== null && j.image_id !== 'null') {\n    const n = parseInt(j.image_id, 10);\n    if (!isNaN(n)) imgIdStr = String(n);\n  }\n\n  // image_id는 추출LLM이 별도로 고르므로, 다단계 보정을 거친 cid와 교차검증한다.\n  // 불일치/검증실패 시 잘못된 캐릭터 사진을 보여주기보다 image_id를 비워 캐릭터 폴백으로 본다.\n  let imgMismatch = '';\n  if (imgIdStr) {\n    try {\n      const catObj = JSON.parse(catalog || '{}');\n      const items = Array.isArray(catObj.image_catalog) ? catObj.image_catalog : [];\n      const hit = items.find(it => String(it.image_id) === String(imgIdStr));\n      if (!hit) {\n        imgMismatch = JSON.stringify({ reason: 'image_id_not_in_catalog', image_id: imgIdStr, cid: cid });\n        imgIdStr = '';\n      } else {\n        const imgCid = hit.character_id || '';\n        const narratorDefaultOk = (cid === 'narrator' && imgCid === 'default');\n        if (!narratorDefaultOk && imgCid !== cid) {\n          imgMismatch = JSON.stringify({ reason: 'character_mismatch', image_id: imgIdStr, image_character_id: imgCid, cid: cid });\n          imgIdStr = '';\n        }\n      }\n    } catch (e) {\n      imgMismatch = JSON.stringify({ reason: 'catalog_parse_failed', image_id: imgIdStr, cid: cid });\n      imgIdStr = '';\n    }\n  }\n  savePatch.last_character_id = cid;\n  savePatch.last_image_id = imgIdStr || null;\n  // 진단용: LLM이 image_id 필드에 실제로 뭘 썼는지(필드 누락/null/이상값 구분) 그대로 기록\n  savePatch.debug_image_id_raw = JSON.stringify(j.image_id === undefined ? '__MISSING__' : j.image_id);\n  savePatch.debug_json_parse_ok = jsonStr ? 'true' : 'false';\n  savePatch.debug_image_mismatch = imgMismatch || 'false';\n  savePatch.debug_stream_image_injected = hadInlineImage ? 'true' : 'false';\n\n  // 플레이 모드에서 답변된 플레이어 정보만 골라 master.player 패치로 뽑아냄 (빈 값/미답변 필드는 제외)\n  let playerPatch = {};\n  if (j.player_patch && typeof j.player_patch === 'object') {\n    const allowed = ['name','age','gender','height_cm','weight_kg','job','background','location','style','penis_length_cm'];\n    for (const k of allowed) {\n      const v = j.player_patch[k];\n      if (v !== undefined && v !== null && v !== '') playerPatch[k] = v;\n    }\n  }\n  const playerPatchJson = Object.keys(playerPatch).length ? JSON.stringify({ player: playerPatch }) : '{}';\n\n  return {\n    narrative_text: narrative || '',\n    narrative_escaped: esc(narrative || ''),\n    save_patch_json: JSON.stringify(savePatch),\n    player_patch_json: playerPatchJson,\n    choices: choices,\n    character_id: cid,\n    emotion_id: 'default',\n    image_id: imgIdStr\n  };\n}"
