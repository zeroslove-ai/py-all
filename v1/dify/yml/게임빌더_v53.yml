    - id: c_code_voice_lookup_auto
      data:
        code: "function main({ctx, llm_text, cid}) {\n  let obj = {};\n  try { obj = JSON.parse(ctx || '{}'); } catch(e){}\n  const master = obj.master || {};\n  const chars = master.characters || {};\n  const name = (chars[cid] && chars[cid].name) ? chars[cid].name : '';\n\n  const scene = String(llm_text || '').split('\\n---')[0];\n  const speakerRe = /\\*{0,2}([가-힣A-Za-z0-9]{2,12})\\*{0,2}\\s*(?:\\(([^)\\n]{0,60})\\))?\\s*:\\s*\"([^\"]+)\"/g;\n  let lines = [], m;\n  while ((m = speakerRe.exec(scene)) !== null) {\n    if (name && m[1].trim() !== name) continue;\n    lines.push((m[2] ? '['+m[2]+'] ' : '') + m[3]);\n  }\n  if (!lines.length) return { skip_tts: true, tts_text: '', voice_id: '' };\n\n  let text = lines.join(' ... ').replace(/[\"\\\\]+/g,' ').replace(/[\\r\\n]+/g,' ').replace(/\\s{2,}/g,' ').trim();\n  let voice = (chars[cid] && chars[cid].voice_id) ? chars[cid].voice_id : '';\n  if (!voice) { const first = Object.keys(chars)[0]; if (first) voice = chars[first].voice_id; }\n  return { skip_tts: false, tts_text: text, voice_id: voice };\n}"
        code_language: javascript
        desc: 이번 턴에 검증된 화자(c_code_parser.character_id)와 정제된 서사(narrative_text)만 사용. 지난 턴 값(ctx.save.last_character_id)을 쓰지 않아 화자 바뀐 턴에서도 정확함
        outputs:
          skip_tts:
            type: boolean
          tts_text:
            type: string
          voice_id:
            type: string
        selected: false
        title: 자동 보이스 조회
