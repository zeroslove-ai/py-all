<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임빌더 v2</title>
  <style>
    /* ─── CSS Variables (Dark Theme) ─── */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #2a2a4a;
      --success: #4ecca3;
      --warning: #f4d03f;
      --danger: #e74c3c;
      --font-mono: 'Courier New', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.2rem; color: var(--accent); }
    .header .meta { font-size: 0.8rem; color: var(--text-secondary); }
    .header .meta span { margin-left: 12px; }

    /* ─── Main Layout ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Story Stream (Left/Center) ─── */
    .story-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .story-stream {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      line-height: 1.8;
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .story-stream .narrative { margin-bottom: 16px; }
    .story-stream .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .story-stream .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      animation: blink 1s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* ─── Side Panel (Right) ─── */
    .side-panel {
      width: 320px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .side-panel .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .side-panel .panel-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Character Image */
    .character-img {
      width: 100%;
      height: 440px;
      object-fit: contain;
      object-position: top center;
      border-radius: var(--radius);
      background: var(--bg-tertiary);
      display: block;
    }
    .character-img.hidden { display: none; }

    /* Mind Monitor */
    .mind-monitor {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: var(--radius);
      display: grid;
      gap: 10px;
    }

    /* Player Status */
    .player-status {
      font-size: 0.85rem;
    }
    .player-status .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .player-status .stat-label { color: var(--text-secondary); }
    .player-status .stat-value { color: var(--accent); }
    .info-list, .npc-status { font-size: 0.85rem; }
    .stat-value.signal-green { color: #4ade80; }
    .stat-value.signal-yellow { color: #facc15; }
    .stat-value.signal-red { color: #fb7185; }
    .delta-up { color: #4ade80; } .delta-down { color: #fb7185; }

    /* Audio Player */
    .audio-player {
      display: none;
    }
    .audio-player.active {
      display: block;
      width: 100%;
      margin-top: 8px;
    }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    /* Choice Buttons */
    .choice-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .choice-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 14px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
      text-align: left;
      line-height: 1.5;
    }
    .choice-btn:hover {
      border-color: var(--accent);
      background: var(--bg-primary);
    }
    .choice-btn .marker {
      color: var(--accent);
      font-weight: bold;
      margin-right: 6px;
    }
    .choice-btn.explicit {
      border-color: var(--warning);
    }
    .choice-btn.selected { border-color: var(--accent); background: rgba(233, 69, 96, .18); }
    .choice-btn:disabled { cursor: not-allowed; opacity: .7; }
    .choice-btn.app-info { width: 100%; padding: 9px 12px; font-size: .85rem; color: var(--text-secondary); border-style: dashed; }

    /* Chat Input */
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send {
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .chat-send:hover { background: var(--accent-hover); }
    .chat-send:disabled {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }
    .loading.active { display: block; }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tts-toggle, .command-toggle { position: absolute; top: 10px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; cursor: pointer; }
    .tts-toggle { right: 16px; } .command-toggle { right: 120px; }
    .reset-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; display: grid; place-items: center; padding: 20px; }
    .reset-modal { max-width: 480px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: grid; gap: 14px; }
    .reset-actions { display: flex; gap: 10px; justify-content: flex-end; } .reset-actions .danger { background: var(--danger); }

    /* Responsive */
    @media (max-width: 768px) {
      body { height: auto; min-height: 100vh; overflow-y: auto; }
      .main { display: flex; flex-direction: column; overflow: visible; }
      .story-panel, .story-stream { overflow: visible; }
      .side-panel { display: flex; width: 100%; border-left: none; border-top: 1px solid var(--border); overflow: visible; }
      .character-img { width: 100%; height: min(620px, 125vw); object-fit: contain; object-position: top center; }
      .bottom-bar { position: sticky; bottom: 0; z-index: 20; }
      .choice-buttons { grid-template-columns: 1fr; gap: 9px; }
      .choice-btn { width: 100%; min-width: 0; padding: 14px 16px; line-height: 1.5; text-align: left; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🎮 게임빌더 v2</h1>
    <div class="meta">
      <span id="game-title">게임 제목</span>
      <span id="turn-count">턴: 0</span>
      <span id="mode-badge">플레이</span>
    </div>
  </header>

  <button class="tts-toggle" id="tts-toggle" type="button">🔊 음성 ON</button>
  <button class="command-toggle" id="command-toggle" type="button">/ 안내</button>
  <div class="main">
    <div class="story-panel">
      <div class="story-stream" id="story-stream">
        <div class="loading" id="loading">서사를 불러오는 중</div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="panel-section">
        <div class="panel-title">캐릭터</div>
        <img class="character-img hidden" id="character-img" alt="character">
      </div>

      <div class="panel-section">
        <div class="panel-title">마인드 모니터</div>
        <div class="mind-monitor" id="mind-monitor">(대기 중)</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">플레이어 상황</div>
        <div class="player-status" id="player-status">
          <div class="stat-row"><span class="stat-label">위치</span><span class="stat-value" id="stat-location">-</span></div>
          <div class="stat-row"><span class="stat-label">순응도</span><span class="stat-value" id="stat-순응도">-</span></div>
          <div class="stat-row"><span class="stat-label">호감도</span><span class="stat-value" id="stat-호감도">-</span></div>
          <div class="stat-row"><span class="stat-label">최면깊이</span><span class="stat-value" id="stat-최면깊이">-</span></div>
          <div class="stat-row"><span class="stat-label">상식개변</span><span class="stat-value" id="stat-csa">없음</span></div>
        </div>
      </div>

      <div class="panel-section">
        <audio class="audio-player" id="audio-player" controls></audio>
      </div>
    </aside>
  </div>

  <div class="bottom-bar">
    <div class="choice-buttons" id="choice-buttons"></div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="행동을 입력하거나 선택지를 클릭하세요..." autocomplete="off">
      <button class="chat-send" id="chat-send">전송</button>
    </div>
  </div>

  <script src="state.js"></script>
  <script src="api.js"></script>
  <script src="stream.js"></script>
  <script src="ui.js"></script>
  <script src="sidebar.js"></script>
  <script>
    // ─── Entry Point ───
    const GAME_ID = new URLSearchParams(location.search).get('game') || localStorage.getItem('gameId');
    if (GAME_ID) {
      state.gameId = GAME_ID;
      localStorage.setItem('gameId', GAME_ID);
      loadGameContext();
    } else {
      ui.showSystemMessage('게임 ID가 없습니다. URL에 ?game=GAME_ID를 추가하거나 /api/context로 게임을 로드하세요.');
    }

    async function loadGameContext() {
      ui.setLoading(true);
      try {
        const ctx = await api.context(state.gameId);
        state.turnCount = ctx.turn_count ?? 0;
        state.imageCatalog = ctx.image_catalog || {};
        state.context = ctx.context || null;
        ui.updateMeta(ctx.context?.master?.title || ctx.context?.title || '게임 제목', state.turnCount);
        sidebar.updateContext(state.context);
        const activeCharacterId = state.context?.save?.last_character_id;
        if (activeCharacterId && activeCharacterId !== 'narrator') {
          sidebar.updateMind(state.context?.save?.npc_emotion?.[activeCharacterId]);
          sidebar.renderStats(state.context?.save?.npc_stats?.[activeCharacterId]);
          api.image(state.gameId, activeCharacterId, state.context?.save?.last_image_id)
            .then(res => { if (res.image_url) ui.showImage(res.image_url); })
            .catch(() => {});
        }
        ui.setLoading(false);
      } catch (e) {
        ui.showSystemMessage('컨텍스트 로드 실패: ' + e.message);
        ui.setLoading(false);
      }
    }

    // ─── Event Listeners ───
    document.getElementById('chat-send').addEventListener('click', handleTurnInput);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleTurnInput();
    });
    state.autoTts = localStorage.getItem('autoTts') !== 'false';
    setAutoTts(state.autoTts);
    document.getElementById('tts-toggle').addEventListener('click', () => setAutoTts(!state.autoTts));
    document.getElementById('command-toggle').addEventListener('click', () => handleCommand('/안내'));

    async function handleInput() {
      const input = document.getElementById('chat-input').value.trim();
      if (!input || !state.gameId || state.isStreaming) return;
      document.getElementById('chat-input').value = '';

      ui.addUserMessage(input);
      ui.setLoading(true);
      state.isStreaming = true;

      try {
        const currentTurn = state.turnCount;
        const nextTurn = currentTurn + 1;

        // ① 서사 스트리밍
        const storyResult = await stream.story(state.gameId, input, currentTurn, (chunk) => {
          ui.appendNarrative(chunk);
        });
        const narrative = storyResult.text;

        ui.finalizeNarrative();

        // 재진입 응답은 현재 상태 안내이므로 새로운 턴으로 저장하지 않는다.
        if (storyResult.mode === 'reentry') {
          const choices = ui.parseChoices(narrative);
          ui.renderChoices(choices, submitChoice);
          return;
        }

        // ② 상태 추출
        // 원본 입력을 별도 필드로 보내 이름·직업 등이 서사에서 생략돼도 저장한다.
        const extract = await api.extract(state.gameId, narrative, nextTurn, input);
        state.lastExtract = extract;

        // ③ 이미지/TTS는 선택 작업으로 병렬 실행
        const optionalTasks = [];

        // 이미지
        if (extract.character_id && extract.character_id !== 'narrator') {
          optionalTasks.push(
            api.image(state.gameId, extract.character_id, extract.image_id)
              .then(res => { if (res.image_url) ui.showImage(res.image_url); })
              .catch(() => {})
          );
        }

        // TTS (auto_tts ON이고 대사 있으면)
        if (state.autoTts && extract.dialogue_lines && extract.dialogue_lines.length > 0) {
          const line = extract.dialogue_lines[0];
          const voiceId = getVoiceId(extract.character_id);
          if (voiceId && line.text) {
            optionalTasks.push(
              api.tts(line.text, voiceId)
                .then(res => { if (res.url) ui.playAudio(res.url); })
                .catch(() => {})
            );
          }
        }

        // ④ 핵심 저장은 Worker의 단일 커밋 엔드포인트로 수행한다.
        const enginePatch = storyResult.mode === 'opening'
          ? { opening_started: true }
          : {};
        const saveRes = await retryRequest(() =>
          api.commitTurn(state.gameId, nextTurn, narrative, extract, enginePatch)
        );
        state.turnCount = saveRes.turn_count;
        ui.updateMeta(null, state.turnCount);
        sidebar.updateCharacter(extract.character_id);
        sidebar.updateMind(extract.npc_emotion);
        sidebar.renderStats(extract.npc_stats);

        // ⑤ 저장 성공 후 선택지를 활성화한다.
        const choices = ui.parseChoices(narrative);
        ui.renderChoices(choices, submitChoice);

        await Promise.allSettled(optionalTasks);

      } catch (e) {
        if (e.status === 409) {
          ui.showSystemMessage('다른 창에서 턴이 진행되었습니다. 최신 상태를 다시 불러옵니다.');
          await loadGameContext();
        } else {
          ui.showSystemMessage('턴 저장 또는 처리 실패: ' + e.message + ' — 입력을 다시 시도해 주세요.');
        }
      } finally {
        state.isStreaming = false;
        ui.setLoading(false);
      }
    }

    function restoreLastTurn() {
      const memories = state.context?.recent_memories || [];
      const last = memories[memories.length - 1];
      const narrative = typeof last === 'string' ? last : last?.content || '';
      ui.restoreNarrative(narrative);
    }

    function feedbackKey() { return `gameFeedback:${state.gameId}`; }
    function getFeedback() { try { return JSON.parse(localStorage.getItem(feedbackKey()) || '[]'); } catch { return []; } }
    function saveFeedback(items) { localStorage.setItem(feedbackKey(), JSON.stringify(items)); }

    async function handleCommand(input) {
      const [command, ...rest] = input.trim().split(/\s+/);
      const value = rest.join(' ').trim();
      if (['/안내', '/도움말', '/help'].includes(command)) {
        ui.showSystemMessage('사용 가능한 명령어\n/플레이 — 현재 상태 새로고침\n/리셋 — 진행 기록 초기화\n/피드백 내용 — 다음 서사에 한 번 반영\n/음성 켜기 · /음성 끄기');
      } else if (command === '/플레이') {
        await loadGameContext();
        restoreLastTurn();
        const choices = state.context?.save?.active_suggestions || [];
        ui.renderGameplayChoices(choices, submitChoice, { onAppInfo: showAppInfo });
        ui.showSystemMessage('현재 게임을 이어서 진행합니다.');
      } else if (command === '/리셋') {
        showResetModal();
      } else if (command === '/피드백') {
        if (!value) { ui.showSystemMessage('사용법: /피드백 다음 서사에서 고칠 점'); return; }
        saveFeedback([...getFeedback(), { text: value, created_at: new Date().toISOString() }]);
        ui.showSystemMessage('피드백을 다음 서사에 반영합니다.');
      } else if (command === '/음성' && value === '켜기') {
        setAutoTts(true); ui.showSystemMessage('자동 음성을 켰습니다.');
      } else if (command === '/음성' && value === '끄기') {
        setAutoTts(false); ui.showSystemMessage('자동 음성을 껐습니다.');
      } else ui.showSystemMessage('알 수 없는 명령어입니다. /안내를 입력해 보세요.');
    }

    function setAutoTts(enabled) {
      state.autoTts = enabled; localStorage.setItem('autoTts', String(enabled));
      if (!enabled) { ui.els.audioPlayer.pause(); ui.els.audioPlayer.removeAttribute('src'); }
      document.getElementById('tts-toggle').textContent = enabled ? '🔊 음성 ON' : '🔇 음성 OFF';
    }

    function showResetModal() {
      const overlay = document.createElement('div'); overlay.className = 'reset-modal-overlay';
      overlay.innerHTML = `<div class="reset-modal" role="dialog" aria-modal="true"><h2>게임 진행 기록 초기화</h2><p>게임 ID<br><code>${state.gameId}</code></p><p>현재 게임의 턴, 플레이어 정보, NPC 상태 및 진행 기록이 초기 상태로 돌아갑니다.</p><p>이 작업은 되돌릴 수 없습니다.</p><div class="reset-actions"><button class="choice-btn cancel">취소</button><button class="choice-btn danger confirm">진행 기록 초기화</button></div></div>`;
      const close = () => overlay.remove();
      overlay.addEventListener('click', event => { if (event.target === overlay) close(); });
      overlay.querySelector('.cancel').addEventListener('click', close);
      overlay.querySelector('.confirm').addEventListener('click', async () => { await api.reset(state.gameId); close(); ui.clearGameView(); await loadGameContext(); ui.showSystemMessage('진행 기록을 초기화했습니다.'); });
      document.addEventListener('keydown', function onKey(event) { if (event.key === 'Escape') { close(); document.removeEventListener('keydown', onKey); } });
      document.body.appendChild(overlay); overlay.querySelector('.cancel').focus();
    }

    async function handleTurnInput() {
      const input = document.getElementById('chat-input').value.trim();
      if (!input || !state.gameId || state.isStreaming) return;
      document.getElementById('chat-input').value = '';
      if (input.startsWith('/')) { await handleCommand(input); return; }
      ui.addUserMessage(input);
      await retryStory({ input, nextTurn: state.turnCount + 1, narrative: null, extract: null, mode: null });
    }

    async function retryStory(pending) {
      state.isStreaming = true; ui.setLoading(true, '서사 생성 중');
      try {
        const result = await stream.story(state.gameId, pending.input, state.turnCount, chunk => ui.appendNarrative(chunk), getFeedback());
        pending.narrative = result.text; pending.mode = result.mode; ui.finalizeNarrative();
        if (result.mode === 'reentry') { ui.renderChoices(ui.parseChoices(result.text), submitChoice); return; }
        await retryExtract(pending);
      } catch (_) {
        ui.failCurrentNarrative();
        ui.setChoicesEnabled(true);
        ui.showRetryNotice('서사 생성에 실패했습니다.', '다시 생성', () => retryStory(pending));
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    async function retryExtract(pending) {
      state.isStreaming = true; ui.setLoading(true, '상태 분석 중');
      try {
        pending.extract = await api.extract(state.gameId, pending.narrative, pending.nextTurn, pending.input);
        ui.removeTrailingChoiceBlock(pending.extract.choices);
        await retryCommit(pending);
      } catch (_) {
        ui.showRetryNotice('서사는 생성되었지만 상태 분석에 실패했습니다.', '상태 분석 다시 시도', () => retryExtract(pending));
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    async function retryCommit(pending) {
      state.isStreaming = true; ui.setLoading(true, '턴 저장 중');
      try {
        const saved = await api.commitTurn(state.gameId, pending.nextTurn, pending.narrative, pending.extract, pending.mode === 'opening' ? { opening_started: true } : {});
        state.turnCount = saved.turn_count; ui.updateMeta(null, state.turnCount);
        saveFeedback([]);
        sidebar.updateCharacter(pending.extract.character_id); sidebar.updateMind(pending.extract.npc_emotion); sidebar.renderStats(pending.extract.npc_stats);
        ui.renderGameplayChoices(pending.extract.choices, submitChoice, { setup: pending.mode === 'player_setup', onAppInfo: showAppInfo });
        prepareMedia(pending.extract);
      } catch (error) {
        if (error.status === 409) {
          document.getElementById('chat-input').value = pending.input;
          ui.showSystemMessage('다른 창에서 게임이 먼저 진행되었습니다. 최신 상태를 다시 불러왔습니다.');
          await loadGameContext();
        } else ui.showRetryNotice('서사와 상태 분석은 완료됐지만 저장에 실패했습니다.', '저장 다시 시도', () => retryCommit(pending));
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    function prepareMedia(extract) {
      enqueueTts(extract);
      if (extract.character_id && extract.character_id !== 'narrator') {
        ui.setLoading(true, '이미지 준비 중');
        api.image(state.gameId, extract.character_id, extract.image_id)
          .then(res => { if (res.image_url) ui.showImage(res.image_url); })
          .catch(() => ui.showRetryNotice('이미지를 불러오지 못했습니다.', '이미지만 다시 불러오기', () => prepareMedia({ ...extract, dialogue_lines: [] }), false))
          .finally(() => ui.setLoading(false));
      }
      const line = extract.dialogue_lines?.[0], voiceId = getVoiceId(extract.character_id);
      if (false && state.autoTts && line?.text && voiceId) {
        ui.setLoading(true, '음성 준비 중');
        api.tts(line.text, voiceId)
          .then(res => { if (res.url) ui.playAudio(res.url); })
          .catch(() => ui.showRetryNotice('음성 재생에 실패했습니다.', '음성 다시 재생', () => prepareMedia({ ...extract, character_id: null }), false))
          .finally(() => ui.setLoading(false));
      }
    }

    const playedTtsKeys = new Set(JSON.parse(sessionStorage.getItem('playedTtsKeys') || '[]'));
    let ttsQueue = Promise.resolve();
    function ttsKey(line) { return `${state.turnCount}:${line.speaker}:${line.text}`; }
    function enqueueTts(extract) {
      if (!state.autoTts) return;
      for (const line of (extract.dialogue_lines || [])) {
        const voiceId = getVoiceId(extract.character_id);
        const key = ttsKey(line);
        if (!voiceId || !line.text || playedTtsKeys.has(key)) continue;
        playedTtsKeys.add(key); sessionStorage.setItem('playedTtsKeys', JSON.stringify([...playedTtsKeys]));
        ttsQueue = ttsQueue.then(() => playQueuedTts(line, voiceId, key));
      }
    }
    async function playQueuedTts(line, voiceId, key) {
      if (!state.autoTts) return;
      ui.setLoading(true, '음성 준비 중');
      try {
        const result = await api.tts(line.text, voiceId, line.direction || '');
        if (!result.url || !state.autoTts) return;
        const audio = ui.els.audioPlayer; audio.src = result.url; audio.classList.add('active');
        await new Promise((resolve, reject) => { audio.onended = resolve; audio.onerror = reject; audio.play().catch(reject); });
      } catch (_) { ui.showRetryNotice('음성 재생에 실패했습니다.', '음성 다시 재생', () => { playedTtsKeys.delete(key); enqueueTts({ dialogue_lines: [line] }); }, false); }
      finally { ui.setLoading(false); }
    }

    function showAppInfo() {
      const save = state.context?.save || {};
      const progress = save.player_progress || { level: 1, exp: 0, next_level_exp: 10 };
      const csa = Array.isArray(save.csa_active) ? save.csa_active.filter(item => item?.active) : [];
      const suggestions = Array.isArray(save.active_suggestions) ? save.active_suggestions : [];
      ui.showSystemMessage(`📱 어플 정보\n레벨 ${progress.level || 1} · 경험치 ${progress.exp || 0}/${progress.next_level_exp || 10}\n기능: 개인 대상 일반 최면·암시 / 마인드 모니터 / 공간 범위 상식 개변\n활성 암시: ${suggestions.length ? suggestions.join(', ') : '없음'}\n상식 개변: ${csa.length ? csa.map(item => `${item.content} (${item.scope_label || item.scope_id})`).join(', ') : '없음'}`);
    }

    function submitChoice(choiceText) {
      document.getElementById('chat-input').value = choiceText;
      handleTurnInput();
    }

    async function retryRequest(operation, maxAttempts = 3) {
      let lastError;
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          return await operation();
        } catch (error) {
          lastError = error;
          if (error.status && error.status < 500) throw error;
          if (attempt < maxAttempts) {
            await new Promise(resolve => setTimeout(resolve, 300 * (2 ** (attempt - 1))));
          }
        }
      }
      throw lastError;
    }

    function getVoiceId(characterId) {
      return state.context?.master?.characters?.[characterId]?.voice_id || null;
    }
  </script>
</body>
</html>
