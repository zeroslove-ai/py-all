<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임빌더 v2</title>
  <style>
    /* ─── CSS Variables (Dark Theme) ─── */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #2a2a4a;
      --success: #4ecca3;
      --warning: #f4d03f;
      --danger: #e74c3c;
      --font-mono: 'Courier New', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.2rem; color: var(--accent); }
    .header .meta { font-size: 0.8rem; color: var(--text-secondary); }
    .header .meta span { margin-left: 12px; }
    .header-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }

    /* ─── Main Layout ─── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Story Stream (Left/Center) ─── */
    .story-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .story-stream {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      line-height: 1.8;
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .story-stream .narrative { margin-bottom: 16px; }
    .story-stream .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }
    .story-stream .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      animation: blink 1s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* ─── Side Panel (Right) ─── */
    .side-panel {
      width: 320px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .side-panel .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .side-panel .panel-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Character Image */
    .character-img {
      width: 100%;
      height: 440px;
      object-fit: contain;
      object-position: top center;
      border-radius: var(--radius);
      background: var(--bg-tertiary);
      display: block;
    }
    .character-img.hidden { display: none; }

    /* Mind Monitor */
    .mind-monitor {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: var(--radius);
      display: grid;
      gap: 10px;
    }
    .mind-item { display: grid; gap: 5px; }
    .mind-item b { color: var(--text-primary); }
    .mind-item blockquote, .mind-item p { margin: 0; white-space: pre-wrap; }
    .mind-item blockquote { padding-left: 10px; border-left: 2px solid var(--accent); color: var(--text-primary); font-style: italic; }
    .mind-item p { color: var(--text-secondary); }

    /* Player Status */
    .player-status {
      font-size: 0.85rem;
    }
    .player-status .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .player-status .stat-label { color: var(--text-secondary); }
    .player-status .stat-value { color: var(--accent); }
    .character-info-compact, .npc-status, .relationship-inline { font-size: 0.85rem; }
    .character-info-compact { display: grid; gap: 6px; line-height: 1.45; }
    .character-affiliation { color: var(--text-primary); font-weight: 700; }
    .relationship-inline {
      display: block;
      white-space: nowrap;
      font-size: 0.85rem;
      color: var(--text-primary);
      background: var(--bg-tertiary);
      padding: 9px 10px;
      border-radius: var(--radius);
    }
    .relationship-inline strong { color: var(--accent); font-weight: 800; }
    .stat-value.signal-green { color: #4ade80; }
    .stat-value.signal-yellow { color: #facc15; }
    .stat-value.signal-red { color: #fb7185; }
    .delta-up { color: #4ade80; } .delta-down { color: #fb7185; }

    /* Audio Player */
    .audio-player {
      display: none;
    }
    .audio-player.active {
      display: block;
      width: 100%;
      margin-top: 8px;
    }
    .side-panel-footer {
      margin-top: auto;
      position: sticky;
      bottom: 0;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      z-index: 2;
    }
    .side-action-row { display: flex; gap: 8px; }
    .side-action-btn {
      width: calc(50% - 4px);
      padding: 12px 16px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .side-action-btn:hover { background: var(--accent-hover); }
    .side-action-btn:disabled { cursor: wait; opacity: .65; }
    .npc-status-inline {
      display: block;
      max-height: 2.6em;
      overflow: hidden;
      line-height: 1.3;
      font-size: .85rem;
      word-break: keep-all;
      background: var(--bg-tertiary);
      padding: 9px 10px;
      border-radius: var(--radius);
    }
    .npc-status-inline .stat-value { white-space: nowrap; }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      flex-shrink: 0;
    }

    /* Choice Buttons */
    .choice-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .choice-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      height: 30px;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
      text-align: left;
      line-height: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .choice-btn:hover {
      border-color: var(--accent);
      background: var(--bg-primary);
    }
    .choice-btn .marker {
      color: var(--accent);
      font-weight: bold;
      margin-right: 6px;
    }
    .choice-btn.explicit {
      border-color: var(--warning);
    }
    .choice-btn.selected { border-color: var(--accent); background: rgba(233, 69, 96, .18); }
    .choice-btn:disabled { cursor: not-allowed; opacity: .7; }

    /* Chat Input */
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 7px 12px;
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send {
      background: var(--accent);
      border: none;
      color: white;
      padding: 7px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .chat-send:hover { background: var(--accent-hover); }
    .chat-send:disabled {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }
    .loading.active { display: block; }
    .story-loading {
      flex-shrink: 0;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tts-toggle, .command-toggle, .tts-replay { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; cursor: pointer; white-space: nowrap; }
    .tts-status { max-width: min(460px, 48vw); font-size: .78rem; color: var(--text-secondary); }
    .tts-status.error { color: var(--warning); }
    .reset-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; display: grid; place-items: center; padding: 20px; }
    .reset-modal { max-width: 480px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: grid; gap: 14px; }
    .reset-actions { display: flex; gap: 10px; justify-content: flex-end; } .reset-actions .danger { background: var(--danger); }

    /* Responsive */
    @media (max-width: 768px) {
      body { height: auto; min-height: 100vh; overflow-y: auto; }
      .main { display: flex; flex-direction: column; overflow: visible; }
      .story-panel, .story-stream { overflow: visible; }
      .story-loading { scroll-margin-bottom: 76px; }
      .side-panel { display: flex; width: 100%; border-left: none; border-top: 1px solid var(--border); overflow: visible; }
      .side-panel-footer { position: static; }
      .character-img { width: 100%; height: min(620px, 125vw); object-fit: contain; object-position: top center; }
      .bottom-bar { position: sticky; bottom: 0; z-index: 20; }
      .header { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
      .header-controls { margin-left: 0; width: 100%; }
      .tts-status { max-width: none; flex: 1 1 160px; }
      .choice-buttons { grid-template-columns: 1fr; gap: 9px; }
      .choice-btn { width: 100%; min-width: 0; height: 30px; min-height: 30px; padding: 4px 10px; line-height: 20px; text-align: left; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>🎮 게임빌더 v2</h1>
    <div class="meta">
      <span id="game-title">게임 제목</span>
      <span id="turn-count">턴: 0</span>
      <span id="mode-badge">플레이</span>
    </div>
    <div class="header-controls">
      <button class="tts-toggle" id="tts-toggle" type="button" aria-pressed="true">🔊 음성 ON</button>
      <button class="tts-replay" id="tts-replay" type="button" hidden>▶ 재생</button>
      <button class="command-toggle" id="command-toggle" type="button">/ 안내</button>
      <span class="tts-status" id="tts-status" role="status" hidden></span>
    </div>
  </header>
  <div class="main">
    <div class="story-panel">
      <div class="story-stream" id="story-stream"></div>
      <div class="loading story-loading" id="loading" role="status" aria-live="polite">서사를 불러오는 중</div>
    </div>

    <aside class="side-panel">
      <div class="panel-section">
        <div class="panel-title">캐릭터</div>
        <img class="character-img hidden" id="character-img" alt="character">
      </div>

      <div class="panel-section">
        <div class="panel-title">마인드 모니터</div>
        <div class="mind-monitor" id="mind-monitor">(대기 중)</div>
      </div>

      <div class="panel-section">
        <div class="panel-title">플레이어 상황</div>
        <div class="player-status" id="player-status">
          <div class="stat-row"><span class="stat-label">위치</span><span class="stat-value" id="stat-location">-</span></div>
          <div class="stat-row"><span class="stat-label">순응도</span><span class="stat-value" id="stat-순응도">-</span></div>
          <div class="stat-row"><span class="stat-label">호감도</span><span class="stat-value" id="stat-호감도">-</span></div>
          <div class="stat-row"><span class="stat-label">최면깊이</span><span class="stat-value" id="stat-최면깊이">-</span></div>
          <div class="stat-row"><span class="stat-label">상식개변</span><span class="stat-value" id="stat-csa">없음</span></div>
        </div>
      </div>

      <div class="panel-section">
        <audio class="audio-player" id="audio-player" controls></audio>
      </div>
    </aside>
  </div>

  <div class="bottom-bar">
    <div class="choice-buttons" id="choice-buttons"></div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="행동을 입력하거나 선택지를 클릭하세요..." autocomplete="off">
      <button class="chat-send" id="chat-send">전송</button>
    </div>
  </div>

  <script src="state.js"></script>
  <script src="api.js"></script>
  <script src="stream.js"></script>
  <script src="ui.js"></script>
  <script src="sidebar.js"></script>
  <script src="tts.js"></script>
  <script>
    // ─── Entry Point ───
    const GAME_ID = new URLSearchParams(location.search).get('game') || localStorage.getItem('gameId');
    if (GAME_ID) {
      state.gameId = GAME_ID;
      localStorage.setItem('gameId', GAME_ID);
      loadGameContext();
    } else {
      ui.showSystemMessage('게임 ID가 없습니다. URL에 ?game=GAME_ID를 추가하거나 /api/context로 게임을 로드하세요.');
    }

    async function loadGameContext() {
      ui.setLoading(true);
      try {
        const ctx = await api.context(state.gameId);
        state.turnCount = ctx.turn_count ?? 0;
        state.imageCatalog = ctx.image_catalog || {};
        state.context = ctx.context || null;
        ui.updateMeta(ctx.context?.master?.title || ctx.context?.title || '게임 제목', state.turnCount);
        sidebar.updateContext(state.context);
        const activeCharacterId = state.context?.save?.last_character_id;
        if (activeCharacterId && activeCharacterId !== 'narrator') {
          sidebar.updateMind(state.context?.save?.npc_emotion?.[activeCharacterId]);
          sidebar.renderStats(state.context?.save?.npc_stats?.[activeCharacterId], activeCharacterId, state.context?.save?.npc_stat_changes?.[activeCharacterId]);
          api.image(state.gameId, activeCharacterId, state.context?.save?.last_image_id)
            .then(res => { if (res.image_url) ui.showImage(res.image_url); })
            .catch(() => {});
        }
        ui.setLoading(false);

        const setupIncomplete = state.context?.save?.player_setup?.status !== 'complete';
        const hasNoMemories = !(state.context?.recent_memories || []).length;
        if (state.turnCount === 0 && setupIncomplete && hasNoMemories && !state.startupRequested) {
          await startPlayerSetup();
        }
      } catch (e) {
        ui.showSystemMessage('컨텍스트 로드 실패: ' + e.message);
        ui.setLoading(false);
      }
    }

    // Reset then immediately kick off the player_setup Story call in one
    // flow, so the recommendation cards appear without the user typing
    // anything — loadGameContext() alone never triggers Story requests.
    async function resetAndStartNewGame() {
      await api.reset(state.gameId);
      ui.clearGameView();
      state.turnCount = 0;
      state.context = null;
      state.isStreaming = false;
      // startPlayerSetup() owns the state.startupRequested guard itself, so
      // a second click (or a race with the page-load auto-start) can't fire
      // a duplicate Story request.
      await startPlayerSetup();
    }

    // ─── Event Listeners ───
    document.getElementById('chat-send').addEventListener('click', async () => { await tts.unlockAudio(); handleTurnInput(); });
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { tts.unlockAudio(); handleTurnInput(); }
    });
    tts.init();
    document.getElementById('command-toggle').addEventListener('click', () => handleCommand('/안내'));

    function restoreLastTurn() {
      const memories = state.context?.recent_memories || [];
      const last = memories[memories.length - 1];
      const narrative = typeof last === 'string' ? last : last?.content || '';
      ui.restoreNarrative(narrative);
    }

    function feedbackKey() { return `gameFeedback:${state.gameId}`; }
    function getFeedback() { try { return JSON.parse(localStorage.getItem(feedbackKey()) || '[]'); } catch { return []; } }
    function saveFeedback(items) { localStorage.setItem(feedbackKey(), JSON.stringify(items)); }

    async function handleCommand(input) {
      const [command, ...rest] = input.trim().split(/\s+/);
      const value = rest.join(' ').trim();
      if (['/안내', '/도움말', '/help'].includes(command)) {
        ui.showSystemMessage('사용 가능한 명령어\n/플레이 — 현재 상태 새로고침\n/리셋 — 진행 기록 초기화\n/피드백 내용 — 다음 서사에 한 번 반영\n/음성 켜기 · /음성 끄기');
      } else if (command === '/플레이') {
        await resumeGame();
      } else if (command === '/리셋') {
        showResetModal();
      } else if (command === '/피드백') {
        if (!value) { ui.showSystemMessage('사용법: /피드백 다음 서사에서 고칠 점'); return; }
        saveFeedback([...getFeedback(), { text: value, created_at: new Date().toISOString() }]);
        ui.showSystemMessage('피드백을 다음 서사에 반영합니다.');
      } else if (command === '/음성' && value === '켜기') {
        setAutoTts(true); ui.showSystemMessage('자동 음성을 켰습니다.');
      } else if (command === '/음성' && value === '끄기') {
        setAutoTts(false); ui.showSystemMessage('자동 음성을 껐습니다.');
      } else ui.showSystemMessage('알 수 없는 명령어입니다. /안내를 입력해 보세요.');
    }

    function setAutoTts(enabled) { tts.setEnabled(enabled); }

    function showResetModal() {
      const overlay = document.createElement('div'); overlay.className = 'reset-modal-overlay';
      overlay.innerHTML = `<div class="reset-modal" role="dialog" aria-modal="true"><h2>게임 진행 기록 초기화</h2><p>게임 ID<br><code>${state.gameId}</code></p><p>현재 게임의 턴, 플레이어 정보, NPC 상태 및 진행 기록이 초기 상태로 돌아갑니다.</p><p>이 작업은 되돌릴 수 없습니다.</p><div class="reset-actions"><button class="choice-btn cancel">취소</button><button class="choice-btn danger confirm">진행 기록 초기화</button></div></div>`;
      const close = () => overlay.remove();
      overlay.addEventListener('click', event => { if (event.target === overlay) close(); });
      overlay.querySelector('.cancel').addEventListener('click', close);
      overlay.querySelector('.confirm').addEventListener('click', async () => { close(); await resetAndStartNewGame(); });
      document.addEventListener('keydown', function onKey(event) { if (event.key === 'Escape') { close(); document.removeEventListener('keydown', onKey); } });
      document.body.appendChild(overlay); overlay.querySelector('.cancel').focus();
    }

    async function handleTurnInput() {
      const input = document.getElementById('chat-input').value.trim();
      if (!input || !state.gameId || state.isStreaming) return;
      document.getElementById('chat-input').value = '';
      if (input.startsWith('/')) { await handleCommand(input); return; }
      ui.addUserMessage(input);
      await retryStory({ input, nextTurn: state.turnCount + 1, narrative: null, extract: null, mode: null });
    }

    async function retryStory(pending) {
      state.isStreaming = true; ui.setLoading(true, '서사 생성 중');
      try {
        const result = await stream.story(state.gameId, pending.input, state.turnCount, chunk => ui.appendNarrative(chunk), getFeedback());
        pending.narrative = result.text; pending.mode = result.mode;
        pending.timing = { ...(pending.timing || {}), story: result.timing };
        ui.finalizeNarrative();
        if (result.mode === 'reentry') { ui.renderChoices(ui.parseChoices(result.text), submitChoice); return; }
        await retryExtract(pending);
      } catch (error) {
        ui.failCurrentNarrative();
        ui.setChoicesEnabled(true);
        const code = error.status || 'UNKNOWN';
        const suffix = error.requestId ? ` · 요청 ${error.requestId}` : '';
        if (pending.systemStart) {
          ui.showRetryNotice(`새 게임을 시작하지 못했습니다. [${code}]${suffix}`, '새 게임 다시 시작', () => startPlayerSetup());
        } else {
          ui.showRetryNotice(`서사 생성에 실패했습니다. [${code}]${suffix}`, '다시 생성', () => retryStory(pending));
        }
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    async function retryExtract(pending) {
      state.isStreaming = true; ui.setLoading(true, '상태 분석 중');
      try {
        const result = await api.extract(state.gameId, pending.narrative, pending.nextTurn, pending.input);
        console.info('[extract-timing]', result.timing);
        pending.extract = result.extract;
        pending.timing = { ...(pending.timing || {}), extract: result.timing };
        ui.removeTrailingChoiceBlock(pending.extract.choices);
        await retryCommit(pending);
      } catch (error) {
        const code = error.details?.error_code || error.status || 'UNKNOWN';
        const requestId = error.details?.request_id;
        const suffix = requestId ? ` · 요청 ${requestId}` : '';
        ui.showRetryNotice(
          `서사는 생성되었지만 상태 분석에 실패했습니다. [${code}]${suffix}`,
          '상태 분석 다시 시도',
          () => retryExtract(pending)
        );
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    async function retryCommit(pending) {
      state.isStreaming = true; ui.setLoading(true, '턴 저장 중');
      try {
        const saved = await api.commitTurn(state.gameId, pending.nextTurn, pending.narrative, pending.extract, pending.mode === 'opening' ? { opening_started: true } : {}, pending.input);
        state.turnCount = saved.turn_count; ui.updateMeta(null, state.turnCount);
        pending.timing = { ...(pending.timing || {}), commit: saved.timing };
        if (saved.npc_stats) pending.extract.npc_stats = saved.npc_stats;
        if (saved.npc_stat_changes) pending.extract.npc_stat_changes = saved.npc_stat_changes;
        if (Number.isInteger(saved.image_id)) pending.extract.image_id = saved.image_id;
        if (typeof saved.image_scene_role === 'string') pending.extract.image_scene_role = saved.image_scene_role;
        saveFeedback([]);
        sidebar.updateCharacter(pending.extract.character_id); sidebar.updateMind(pending.extract.npc_emotion); sidebar.renderStats(pending.extract.npc_stats, pending.extract.character_id, pending.extract.npc_stat_changes);
        ui.renderGameplayChoices(pending.extract.choices, submitChoice, { setup: pending.mode === 'player_setup' });
        prepareMedia(pending.extract);
        console.info('[turn-timing]', {
          turn: pending.nextTurn,
          story_first_content_ms: pending.timing?.story?.first_content_ms ?? null,
          story_total_ms: pending.timing?.story?.stream_total_ms ?? null,
          extract_total_ms: pending.timing?.extract?.deepseek_total_ms ?? null,
          commit_total_ms: pending.timing?.commit?.total_ms ?? null,
          total_ms: [pending.timing?.story?.stream_total_ms, pending.timing?.extract?.total_ms, pending.timing?.commit?.total_ms]
            .reduce((sum, value) => sum + (value || 0), 0)
        });
      } catch (error) {
        if (error.status === 409) {
          document.getElementById('chat-input').value = pending.input;
          ui.showSystemMessage('다른 창에서 게임이 먼저 진행되었습니다. 최신 상태를 다시 불러왔습니다.');
          await loadGameContext();
        } else {
          const code = error.details?.error_code || error.status || 'UNKNOWN';
          const requestId = error.details?.request_id;
          const suffix = requestId ? ` · 요청 ${requestId}` : '';
          ui.showRetryNotice(
            `서사와 상태 분석은 완료됐지만 저장에 실패했습니다. [${code}]${suffix}`,
            '저장 다시 시도',
            () => retryCommit(pending)
          );
        }
      } finally { state.isStreaming = false; ui.setLoading(false); }
    }

    function prepareMedia(extract) {
      tts.enqueue(extract, state.turnCount);
      if (extract.character_id && extract.character_id !== 'narrator') {
        ui.setLoading(true, '이미지 준비 중');
        api.image(state.gameId, extract.character_id, extract.image_id)
          .then(res => { if (res.image_url) ui.showImage(res.image_url); })
          .catch(() => ui.showRetryNotice('이미지를 불러오지 못했습니다.', '이미지만 다시 불러오기', () => prepareMedia({ ...extract, dialogue_lines: [] }), false))
          .finally(() => ui.setLoading(false));
      }
    }

    function showAppInfo() {
      const save = state.context?.save || {};
      const progress = save.player_progress || { level: 1, exp: 0, next_level_exp: 10 };
      const csa = Array.isArray(save.csa_active) ? save.csa_active.filter(item => item?.active) : [];
      const suggestionMap = save.active_suggestions && typeof save.active_suggestions === 'object' && !Array.isArray(save.active_suggestions)
        ? save.active_suggestions : {};
      const characters = state.context?.master?.characters || {};
      const suggestionLines = Object.entries(suggestionMap)
        .map(([characterId, list]) => [characterId, (Array.isArray(list) ? list : []).filter(item => item?.active)])
        .filter(([, list]) => list.length)
        .map(([characterId, list]) => {
          const name = characters[characterId]?.name || characters[characterId]?.['이름'] || characterId;
          return `${name}: ${list.map(item => item.content).join(', ')}`;
        });
      ui.showSystemMessage(`📱 어플 정보\n레벨 ${progress.level || 1} · 경험치 ${progress.exp || 0}/${progress.next_level_exp || 10}\n기능: 개인 대상 일반 최면·암시 / 마인드 모니터 / 공간 범위 상식 개변\n활성 암시: ${suggestionLines.length ? suggestionLines.join(' · ') : '없음'}\n상식 개변: ${csa.length ? csa.map(item => `${item.content} (${item.scope_label || item.scope_id})`).join(', ') : '없음'}`);
    }

    function submitChoice(choiceText) {
      tts.unlockAudio();
      document.getElementById('chat-input').value = choiceText;
      handleTurnInput();
    }

    async function resumeGame() {
      const button = document.getElementById('resume-game-button');
      if (state.isStreaming) return;
      if (button) button.disabled = true;
      try {
        await loadGameContext();
        restoreLastTurn();
        const savedChoices = Array.isArray(state.context?.save?.last_choices) ? state.context.save.last_choices : [];
        const choices = savedChoices.length ? savedChoices : ui.parseChoices(state.context?.recent_memories?.at(-1)?.content || '');
        const setup = state.context?.save?.player_setup?.status !== 'complete';
        ui.renderGameplayChoices(choices, submitChoice, { setup });
        ui.showSystemMessage('현재 게임을 이어서 진행합니다.');
      } finally {
        if (button) button.disabled = false;
      }
    }

    async function startPlayerSetup() {
      if (!state.gameId || state.isStreaming || state.startupRequested) return;
      state.startupRequested = true;
      try {
        await retryStory({ input: '__START_PLAYER_SETUP__', nextTurn: state.turnCount + 1, narrative: null, extract: null, mode: 'player_setup', systemStart: true });
      } finally {
        state.startupRequested = false;
      }
    }

    window.resumeGame = resumeGame;
    window.showAppInfo = showAppInfo;

  </script>
</body>
</html>
